<svg width="256" height="256" viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- 背景渐变：模拟程序的深空蓝黑背景 -->
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2a2d3d;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#15171e;stop-opacity:1" />
    </linearGradient>
    
    <!-- 主波的辉光滤镜 (模拟 C++ 中的 AddPolyline 辉光层) -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- 1. 圆角矩形背景 -->
  <rect x="10" y="10" width="236" height="236" rx="48" fill="url(#bgGradient)" stroke="#3a3f55" stroke-width="2"/>

  <!-- 2. 代码括号 (代表 Shader/Compute) - 冷灰白 -->
  <path d="M65 75 L30 128 L65 181" fill="none" stroke="#d0d7de" stroke-width="14" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M191 75 L226 128 L191 181" fill="none" stroke="#d0d7de" stroke-width="14" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- 3. 动态波形 (对应 RenderIntroScreen 中的 lines[3]) -->
  
  <!-- Line 2: 细节谐波 (紫色, 最细) -->
  <path d="M70 128 C 95 90, 110 90, 128 128 S 161 166, 186 128" 
        fill="none" stroke="#b066ff" stroke-width="4" stroke-linecap="round" opacity="0.8"/>

  <!-- Line 1: 次波 (深蓝, 中等粗细) -->
  <path d="M65 128 C 90 70, 105 70, 128 128 S 166 186, 191 128" 
        fill="none" stroke="#0080ff" stroke-width="7" stroke-linecap="round" opacity="0.9"/>

  <!-- Line 0: 主波 (电光青, 最粗, 带辉光) -->
  <!-- 这里的路径使用了 filter="url(#glow)" 模拟发光 -->
  <path d="M60 128 C 90 50, 100 50, 128 128 S 166 206, 196 128" 
        fill="none" stroke="#00ffff" stroke-width="9" stroke-linecap="round" filter="url(#glow)"/>

</svg>